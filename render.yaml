services:
  - type: web
    name: friend-atlas
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: friend-atlas-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
databases:
  - name: friend-atlas-db
    plan: free
